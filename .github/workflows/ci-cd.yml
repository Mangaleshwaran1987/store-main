name: store-main CI/CD
on:
  push:
    branches:
      - main
      - develop
      - feature
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: ./gradlew clean build

      - name: Unit Tests
        run: ./gradlew test

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: build/test-results/test/*.xml
          reporter: java-junit

      - name: JaCoCo Report
        run: ./gradlew jacocoTestReport

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} #Add Sonar token in vault/AWS secret manager
        run: |
          ./gradlew sonar \
            -Dsonar.host.url=${{ secrets.SONAR_HOST }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: OWASP Dependency Check #OWASP Check(dependency, broken authentication if we use gateway with OAUT2.0/OIDC
        run: ./gradlew dependencyCheckAnalyze

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: build/reports/dependency-check-report.html

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
          -t mydockerhub/store-main:${{ github.run_number }} .

      - name: Push Docker Image
        run: |
          docker push mydockerhub/store-main:${{ github.run_number }}

      - name: Package Helm Chart
        run: helm package helm/store-main