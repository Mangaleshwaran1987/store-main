spring:
  datasource:
    url: jdbc:postgresql://localhost:UATPORT/store
    username: admin
    password: admin
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 10
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: UAT PORT

management:
  endpoints:
    web:
      base-path: /manage
      exposure:
        include: health,info,beans,env,metrics,threaddump
  endpoint:
    health:
      show-details: always