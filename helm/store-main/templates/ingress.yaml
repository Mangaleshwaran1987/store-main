 {{- if .Values.ingress.enabled }}

    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: store-main
    spec:
      rules:
        - http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: store-main
                    port:
                      number: 8080
 {{- end }}